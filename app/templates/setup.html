{% extends "base.html" %}
{% set title = 'Studio Setup - ClientFlow' %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card settings-card">
    <p class="eyebrow">Studio setup</p>
    <h1>Set up your workspace</h1>
    <p class="muted">Add the basics clients will see in your review portal. You can edit these later from Settings.</p>

    {% if error %}
      <div class="error-box">{{ error }}</div>
    {% endif %}

    <form class="stack" method="post" action="/setup" novalidate>
      <label>Studio name
        <input type="text" name="studio_name" maxlength="60" required value="{{ branding.studio_name }}" placeholder="Acme Studio">
      </label>

      <label>Brand color
        <input type="color" name="brand_color" value="{{ branding.brand_color }}">
      </label>

      <label>Logo URL
        <input type="url" name="logo_url" value="{{ branding.logo_url }}" placeholder="https://example.com/logo.png">
      </label>

      <label>Email sender name
        <input type="text" name="email_sender_name" maxlength="60" value="{{ branding.email_sender_name }}" placeholder="Acme Studio">
      </label>

      <button class="primary" type="submit">Continue to dashboard</button>
    </form>
  </div>
</section>
{% endblock %}
