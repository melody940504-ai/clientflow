<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Lumaire' }}</title>
  <script>
    const storedTheme = localStorage.getItem('theme') || localStorage.getItem('clientflow-theme');
    if (storedTheme) document.documentElement.setAttribute('data-theme', storedTheme);
  </script>
  <link rel="stylesheet" href="/static/styles.css?v=20260723-theme-menu">
</head>
<body {% if branding %}style="--primary: {{ branding.brand_color }}; --primary-strong: color-mix(in srgb, {{ branding.brand_color }} 86%, white);"{% endif %}>
  <header class="topbar">
    <a class="brand" href="{% if user %}/dashboard{% else %}/{% endif %}">
      <span class="logo">Lu</span>
      <span>Lumaire</span>
    </a>
    <div class="top-menu">
      <button class="theme-toggle menu-trigger" type="button" id="site-menu-toggle" aria-expanded="false">Menu</button>
      <div class="site-menu hidden" id="site-menu-panel">
        <button class="ghost menu-row" type="button" data-theme-toggle>Toggle theme</button>
      {% if user %}
        <a href="/logout" class="ghost menu-row danger-row">Logout</a>
      {% else %}
        <a href="/login" class="ghost menu-row">Login</a>
        <a href="/register" class="top-primary menu-row">Create account</a>
      {% endif %}
      </div>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js?v=20260723-theme-menu"></script>
</body>
</html>
