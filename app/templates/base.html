<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Lumaire' }}</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260723-analytics">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% if user %}/dashboard{% else %}/{% endif %}">
      <span class="logo">Lu</span>
      <span>Lumaire</span>
    </a>
    <div class="top-actions">
      <button class="theme-toggle" type="button" id="themeToggle">Toggle theme</button>
      {% if user %}
      <a href="/logout" class="ghost">Logout</a>
      {% else %}
      <a href="/login" class="ghost">Login</a>
      <a href="/register" class="top-primary">Create account</a>
      {% endif %}
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js?v=20260723-analytics"></script>
</body>
</html>
